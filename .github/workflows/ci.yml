name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.11"
          enable-cache: true
      
      - name: Install dependencies
        run: uv sync --dev
      
      - name: Check formatting
        run: uv run ruff format --check .
      
      - name: Check linting
        run: uv run ruff check .
      
      - name: Type check
        run: uv run mypy tianshou
      
      - name: Run tests
        run: uv run pytest test/ -x --tb=short
